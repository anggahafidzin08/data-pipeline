pipeline:
  pipeline_name: "ecommerce_pipeline"
  source_id: "ecommerce_site"
  log_level: "INFO"

scraper:
  timeout_seconds: 30
  retry_attempts: 2
  delay_between_requests: 1

# Table-driven configuration: define each business object and its pipeline
# Each table flows through Bronze → Silver → Gold with independent configurations
tables:
  products:
    description: "Laptop products from webscraper.io"
    enabled: true

    bronze:
      target_table: "raw_products"
      scraper_url: "https://webscraper.io/test-sites/e-commerce/static/computers/laptops"
      checks:
        - type: "row_count"
          min_rows: 100
          severity: "FAIL"
        - type: "freshness"
          max_age_hours: 25
          severity: "WARN"

    silver:
      source_table: "raw_products"
      source_timestamp_column: "loaded_at"
      target_table: "products_clean"
      transformer: "parse_specs"

      required_fields: ["product_id", "product_name", "price"]
      field_validations:
        - field: "price"
          rule: "numeric_range"
          min: 0.01
          max: 1000000
          severity: "FAIL"

      checks:
        - type: "row_count"
          min_rows: 90
          severity: "FAIL"

      # SCD2 (Slowly Changing Dimension Type 2) configuration
      scd2:
        enabled: true
        composite_key:
          - "product_id"
          - "cpu_type"
          - "builtin_ram"
          - "builtin_memory"
        hash_diff_fields:
          - "price"
          - "screen_size"
          - "cpu_type"
          - "builtin_ram"
          - "builtin_memory"
          - "operating_system"

    gold:
      source_table: "products_clean"
      source_timestamp_column: "insert_ts"
      target_table: "fact_products"
      aggregator: "product_dimensions"

      checks:
        - type: "row_count"
          min_rows: 90
          severity: "FAIL"

